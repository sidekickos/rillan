server:
  host: "127.0.0.1"
  port: 8420
  log_level: "info"

provider:
  type: "openai"
  openai:
    base_url: "https://api.openai.com/v1"
    api_key: "unused-for-indexing"

index:
  root: "../vault/smoke"
  includes: []
  excludes:
    - ".git"
    - "node_modules"
    - ".direnv"
    - ".idea"
  chunk_size_lines: 2

runtime:
  vector_store_mode: "embedded"
  local_model_base_url: "http://127.0.0.1:11434"
